name: Insane Matrix Build

on:
  push:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} | Python ${{ matrix.python-version }} | Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

        node-version:
          - "18"
          - "20"
          - "22"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python Version
        run: python --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show Node Version
        run: node --version

      - name: Show Operating System
        run: echo ${{ runner.os }}

      - name: Final Test
        run: echo "Huge compatibility matrix successful"
